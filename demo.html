<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ジョジョのやること帳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Black+Han+Sans&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #4a0080;
      --deep-purple: #2a0050;
      --gold: #d4a017;
      --bright-gold: #f5c842;
      --pink: #e91e8c;
      --light-purple: #c084e8;
      --bg: #1a0030;
      --card-bg: #2d0055;
      --text: #f0e0ff;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 斜めストライプ背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(212, 160, 23, 0.04) 40px,
        rgba(212, 160, 23, 0.04) 80px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* ヘッダー */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header-badge {
      display: inline-block;
      background: var(--pink);
      color: white;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 3px;
      padding: 4px 14px;
      border-radius: 2px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Black Han Sans', 'Noto Sans JP', sans-serif;
      font-size: 42px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--bright-gold) 0%, var(--pink) 60%, var(--light-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--light-purple);
      letter-spacing: 2px;
      font-weight: 700;
    }

    /* 入力エリア */
    .input-area {
      margin-bottom: 20px;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card-bg);
      border: 2px solid var(--purple);
      border-radius: 4px;
      padding: 14px 16px;
      transition: border-color 0.2s;
      box-shadow: 4px 4px 0 var(--deep-purple), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .input-wrapper:focus-within {
      border-color: var(--gold);
      box-shadow: 4px 4px 0 var(--purple), 0 0 20px rgba(212, 160, 23, 0.2);
    }

    #todo-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
    }

    #todo-input::placeholder {
      color: rgba(192, 132, 232, 0.4);
    }

    #add-btn {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border: none;
      border-radius: 3px;
      color: white;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1px;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    }

    #add-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    #add-btn:not(:disabled):hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    }

    #add-btn:not(:disabled):active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 rgba(0,0,0,0.4);
    }

    /* フィルター */
    .filter-area {
      display: none;
      gap: 6px;
      margin-bottom: 20px;
    }

    .filter-area.visible {
      display: flex;
    }

    .filter-btn {
      flex: 1;
      padding: 8px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1px;
      border: 2px solid var(--purple);
      border-radius: 3px;
      background: transparent;
      color: var(--light-purple);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--purple);
      border-color: var(--gold);
      color: var(--bright-gold);
      box-shadow: 2px 2px 0 var(--deep-purple);
    }

    .filter-btn:not(.active):hover {
      border-color: var(--light-purple);
      color: var(--text);
    }

    /* タスクリスト */
    .todo-list {
      display: flex;
      flex-col;
      gap: 10px;
      flex-direction: column;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card-bg);
      border: 2px solid var(--purple);
      border-radius: 4px;
      padding: 14px 16px;
      transition: all 0.2s;
      box-shadow: 3px 3px 0 var(--deep-purple);
      position: relative;
      overflow: hidden;
    }

    .todo-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--pink), var(--light-purple));
    }

    .todo-item:hover {
      border-color: var(--gold);
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--deep-purple);
    }

    .todo-item.completed {
      opacity: 0.5;
      border-color: rgba(74, 0, 128, 0.5);
      box-shadow: 2px 2px 0 var(--deep-purple);
    }

    .todo-item.completed::before {
      background: var(--gold);
    }

    /* チェックボタン */
    .check-btn {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--light-purple);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 14px;
      color: transparent;
    }

    .check-btn:hover {
      border-color: var(--gold);
      box-shadow: 0 0 8px rgba(212, 160, 23, 0.5);
    }

    .check-btn.checked {
      background: var(--gold);
      border-color: var(--bright-gold);
      color: var(--deep-purple);
      box-shadow: 0 0 12px rgba(212, 160, 23, 0.6);
    }

    /* テキスト */
    .todo-text {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text);
      transition: all 0.2s;
    }

    .todo-text.completed {
      text-decoration: line-through;
      color: rgba(192, 132, 232, 0.4);
    }

    /* 削除ボタン */
    .delete-btn {
      flex-shrink: 0;
      opacity: 0;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 3px;
      background: transparent;
      color: rgba(192, 132, 232, 0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
      font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.15s;
      letter-spacing: 0;
    }

    .todo-item:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      background: rgba(233, 30, 140, 0.15);
      color: var(--pink);
    }

    /* 空メッセージ */
    .empty-msg {
      text-align: center;
      padding: 60px 20px;
      color: rgba(192, 132, 232, 0.3);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      display: none;
    }

    .empty-msg span {
      display: block;
      font-size: 40px;
      margin-bottom: 12px;
    }

    /* フッター */
    .footer {
      text-align: center;
      margin-top: 60px;
      font-size: 11px;
      color: rgba(192, 132, 232, 0.25);
      letter-spacing: 2px;
      font-weight: 700;
    }

    /* 完了時のスター装飾 */
    @keyframes starPop {
      0% { transform: scale(0) rotate(-30deg); opacity: 0; }
      60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .check-btn.checked {
      animation: starPop 0.3s ease-out;
    }

    /* 削除アニメーション */
    .todo-item.removing {
      opacity: 0;
      transform: translateX(20px);
      transition: all 0.2s ease-out;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-badge">★ STAND USER ★</div>
    <h1>ジョジョの<br>やること帳</h1>
    <p class="subtitle" id="subtitle">使命を入力するのだッ！</p>
  </div>

  <!-- 入力エリア -->
  <div class="input-area">
    <div class="input-wrapper">
      <input
        id="todo-input"
        type="text"
        placeholder="新たな使命を入力..."
        autocomplete="off"
      />
      <button id="add-btn" disabled>オラッ！</button>
    </div>
  </div>

  <!-- フィルター -->
  <div class="filter-area" id="filter-area">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active')">未完了</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done')">完了</button>
  </div>

  <!-- タスクリスト -->
  <div class="todo-list" id="todo-list"></div>
  <div class="empty-msg" id="empty-msg">
    <span>🌟</span>やることがないッ！
  </div>

  <div class="footer">Enterキーまたは「オラッ！」ボタンで使命を追加</div>
</div>

<script>
  let todos = (() => { try { return JSON.parse(localStorage.getItem('jojo-todos') || '[]'); } catch { return []; } })();
  let filter = 'all';

  const input = document.getElementById('todo-input');
  const addBtn = document.getElementById('add-btn');
  const list = document.getElementById('todo-list');
  const emptyMsg = document.getElementById('empty-msg');
  const filterArea = document.getElementById('filter-area');
  const subtitle = document.getElementById('subtitle');

  input.addEventListener('input', () => {
    addBtn.disabled = !input.value.trim();
  });

  let isComposing = false;
  input.addEventListener('compositionstart', () => { isComposing = true; });
  input.addEventListener('compositionend', () => { isComposing = false; });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !isComposing) addTodo();
  });

  addBtn.addEventListener('click', addTodo);

  function addTodo() {
    const text = input.value.trim();
    if (!text) return;
    todos.unshift({ id: Date.now().toString(), text, completed: false });
    input.value = '';
    addBtn.disabled = true;
    save();
    render();
    input.focus();
  }

  function toggleTodo(id) {
    todos = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
    save();
    render();
  }

  function deleteTodo(id) {
    const el = document.getElementById('todo-' + id);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => {
        todos = todos.filter(t => t.id !== id);
        save();
        render();
      }, 200);
    }
  }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === f);
    });
    render();
  }

  function save() {
    try { localStorage.setItem('jojo-todos', JSON.stringify(todos)); } catch {}
  }

  const SUBTITLES = {
    empty: '使命を入力するのだッ！',
    allDone: 'やれやれだぜ…全部終わった',
    remaining: (n) => `残り ${n} つの使命があるッ！`,
  };

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const active = todos.filter(t => !t.completed).length;
    const done = todos.filter(t => t.completed).length;

    if (todos.length === 0) subtitle.textContent = SUBTITLES.empty;
    else if (active === 0) subtitle.textContent = SUBTITLES.allDone;
    else subtitle.textContent = SUBTITLES.remaining(active);

    document.querySelector('[data-filter="all"]').textContent = `全部 (${todos.length})`;
    document.querySelector('[data-filter="active"]').textContent = `未完了 (${active})`;
    document.querySelector('[data-filter="done"]').textContent = `完了 (${done})`;

    filterArea.classList.toggle('visible', todos.length > 0);

    const filtered = todos.filter(t => {
      if (filter === 'active') return !t.completed;
      if (filter === 'done') return t.completed;
      return true;
    });

    list.innerHTML = '';

    if (filtered.length === 0) {
      const msgs = {
        done: '<span>💫</span>完了した使命はないッ！',
        active: '<span>✨</span>未完了の使命はない！やれやれだぜ',
        all: '<span>🌟</span>やることがないッ！',
      };
      emptyMsg.innerHTML = msgs[filter];
      emptyMsg.style.display = 'block';
    } else {
      emptyMsg.style.display = 'none';
    }

    filtered.forEach(todo => {
      const item = document.createElement('div');
      item.id = 'todo-' + todo.id;
      item.className = `todo-item${todo.completed ? ' completed' : ''}`;

      item.innerHTML = `
        <button class="check-btn${todo.completed ? ' checked' : ''}" onclick="toggleTodo('${todo.id}')" title="${todo.completed ? '未完了に戻す' : '完了にする'}">
          ${todo.completed ? '★' : ''}
        </button>
        <span class="todo-text${todo.completed ? ' completed' : ''}">${escapeHtml(todo.text)}</span>
        <button class="delete-btn" onclick="deleteTodo('${todo.id}')" title="無駄無駄！">無駄</button>
      `;

      list.appendChild(item);
    });
  }

  render();
</script>
</body>
</html>
